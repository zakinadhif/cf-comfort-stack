name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Type-check · E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # Generate the API client before type-checking — the app imports generated hooks
      - name: Generate API client (Orval)
        run: pnpm codegen

      - name: Lint (Biome)
        run: pnpm lint

      - name: Unit tests — api
        run: pnpm test:api

      - name: Type-check — api
        working-directory: apps/api
        run: pnpm exec tsc --noEmit

      - name: Type-check — app
        working-directory: apps/app
        run: pnpm exec tsc -b

      - name: Install Playwright browsers
        working-directory: apps/app
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e
